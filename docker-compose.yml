services:
  db:
    image: postgres:15
    container_name: file_share_db
    environment:
      POSTGRES_DB: fileshare
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d fileshare"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: file_share_redis

  backend:
    build: ./backend
    container_name: file_share_backend
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/fileshare
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend/uploads:/app/uploads
      - /var/run/docker.sock:/var/run/docker.sock:ro
    expose:
      - "5000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    image: nginx:alpine
    container_name: webfilemanager-frontend
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

  ctf-ssh:
    build: ./ctf
    container_name: ctf_ssh
    ports:
      - "5073:22"
    restart: unless-stopped
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend

volumes:
  postgres_data: